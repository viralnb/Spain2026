<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#f4f2ed;--card:#fff;--text:#1a1a2e;--muted:#888;--border:#eee;--radius:14px}
body{font-family:'DM Sans',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);max-width:480px;margin:0 auto;min-height:100vh;overflow-x:hidden}

/* Header */
.header{background:linear-gradient(135deg,#1a1a2e,#16213e);padding:20px 16px 14px;position:sticky;top:0;z-index:100}
.header h1{color:#fff;font-size:19px;font-weight:800;letter-spacing:-.5px}
.header .sub{color:rgba(255,255,255,.45);font-size:11px;margin-top:3px}
.tabs{display:flex;gap:6px;overflow-x:auto;padding:12px 0 4px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:6px 13px;border-radius:22px;border:none;cursor:pointer;font-size:11.5px;font-weight:700;font-family:inherit;transition:all .15s;background:rgba(255,255,255,.08);color:rgba(255,255,255,.45)}
.tab.active{color:#fff}

/* City card */
.city-card{border-radius:var(--radius);padding:16px;margin-bottom:16px;color:#fff;position:relative;overflow:hidden}
.city-card h2{font-size:22px;font-weight:800}
.city-card .dates{font-size:12px;opacity:.8;margin-top:3px}
.city-card .hotel{font-size:11px;opacity:.65;margin-top:2px}
.weather{text-align:right;background:rgba(255,255,255,.15);border-radius:10px;padding:6px 10px;position:absolute;top:14px;right:14px}
.weather .icon{font-size:22px}
.weather .temp{font-size:13px;font-weight:700}
.weather .wnote{font-size:9px;opacity:.8}

/* Content */
.content{padding:16px 14px}
.toolbar{display:flex;justify-content:flex-end;margin-bottom:8px}
.expand-btn{background:none;border:1px solid #ccc;border-radius:20px;padding:4px 12px;font-size:11px;color:#666;cursor:pointer;font-family:inherit}

/* Day section */
.day-header{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;background:#f8f9fa;border-radius:11px;cursor:pointer;margin-bottom:8px;transition:background .15s}
.day-header:active{background:#eee}
.day-label{font-weight:700;font-size:14px;color:var(--text)}
.day-count{font-size:11px;color:#999;margin-left:8px}
.day-toggle{font-size:16px;color:#aaa;transition:transform .2s}
.day-activities{margin-bottom:14px}

/* Activity card */
.activity{background:var(--card);border-radius:12px;padding:12px 14px;margin-bottom:8px;border-left:4px solid #155724;box-shadow:0 1px 3px rgba(0,0,0,.05);cursor:pointer;transition:box-shadow .15s}
.activity:active{box-shadow:0 1px 6px rgba(0,0,0,.1)}
.activity.urgent{border-left-color:#e74c3c}
.act-top{display:flex;justify-content:space-between;gap:8px}
.act-main{flex:1;min-width:0}
.act-title{display:flex;align-items:center;gap:6px}
.act-icon{font-size:15px}
.act-name{font-weight:600;font-size:13.5px;color:var(--text)}
.act-meta{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap;align-items:center}
.act-time{font-size:11px;background:#f0f0f0;padding:2px 7px;border-radius:20px;color:#555;font-family:'JetBrains Mono',monospace;font-weight:500}
.act-cost{font-size:11px;color:#888}
.badge{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:700}
.badge.done{background:#d4edda;color:#155724}
.badge.yes{background:#fff3cd;color:#856404}
.badge.other{background:#f0f0f0;color:#666}
.act-arrow{font-size:11px;color:#bbb;flex-shrink:0}

/* Expanded */
.act-detail{margin-top:10px;padding-top:10px;border-top:1px solid #f0f0f0;display:none}
.activity.open .act-detail{display:block}
.act-detail p{font-size:12.5px;color:#333;line-height:1.5;white-space:pre-line;margin-bottom:4px}
.act-detail .note{font-size:12px;color:#888;font-style:italic}
.act-detail .note.urgent-note{color:#c0392b;font-style:normal;font-weight:600}
.act-buttons{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.btn-book,.btn-map,.btn-guru{display:inline-block;font-size:12px;color:#fff;padding:6px 13px;border-radius:22px;text-decoration:none;font-weight:600;font-family:inherit}
.btn-book{background:#2563eb}
.btn-map{background:#16a085}
.btn-guru{background:#e67e22}

/* Hotel detail card */
.htl-card{background:var(--card);border-radius:var(--radius);padding:14px 16px;margin-bottom:14px;border:1px solid #e8e8e8;cursor:pointer}
.htl-card .htl-top{display:flex;justify-content:space-between;align-items:center}
.htl-card .htl-label{font-size:11px;color:#888;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.htl-card .htl-toggle{font-size:11px;color:#bbb}
.htl-card .htl-name{font-size:14px;font-weight:700;margin-top:4px}
.htl-card .htl-room{font-size:12px;color:#666;margin-top:2px}
.htl-body{display:none;margin-top:10px;padding-top:10px;border-top:1px solid #f0f0f0}
.htl-card.open .htl-body{display:block}
.htl-row{display:flex;justify-content:space-between;padding:4px 0;font-size:12px}
.htl-row .label{color:#888}
.htl-row .val{color:#333;font-weight:500;text-align:right;max-width:60%}
.htl-btns{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.btn-pdf{display:inline-block;font-size:12px;color:#fff;background:#8e44ad;padding:6px 13px;border-radius:22px;text-decoration:none;font-weight:600;font-family:inherit}
.btn-call{display:inline-block;font-size:12px;color:#fff;background:#2c3e50;padding:6px 13px;border-radius:22px;text-decoration:none;font-weight:600;font-family:inherit}

/* Flight card */
.flight-card{background:#1a1a2e;border-radius:var(--radius);padding:16px;margin-bottom:16px;color:#fff}
.flight-card h2{font-size:18px;font-weight:800;margin-bottom:4px}
.flight-card .sub{font-size:11px;opacity:.55}

/* Overview */
.overview{background:var(--card);border-radius:var(--radius);padding:14px;margin-top:10px}
.overview h3{font-size:13px;font-weight:700;margin-bottom:10px}
.ov-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f0f0f0;font-size:12px;cursor:pointer}
.ov-row:last-child{border-bottom:none}
.ov-city{font-weight:600}
.ov-info{color:#888}
.ov-total{display:flex;justify-content:space-between;padding:10px 0 0;font-size:14px;font-weight:700}

/* Smooth transitions */
.day-activities{overflow:hidden;transition:max-height .3s ease}
</style>
</head>

<div id="lockscreen" style="position:fixed;top:0;left:0;right:0;bottom:0;background:linear-gradient(135deg,#1a1a2e,#16213e);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px">

<p style="color:rgba(255,255,255,.45);font-size:12px;margin:0 0 24px">Enter password to continue</p>
<input id="pw" type="password" placeholder="Password" autocomplete="off"
style="width:100%;padding:14px 18px;border-radius:12px;border:2px solid rgba(255,255,255,.15);background:rgba(255,255,255,.08);color:#fff;font-size:16px;font-family:'DM Sans',system-ui;outline:none;text-align:center;letter-spacing:2px"
onkeydown="if(event.key==='Enter')unlock()">
<button onclick="unlock()"
style="width:100%;margin-top:12px;padding:14px;border-radius:12px;border:none;background:#e94560;color:#fff;font-size:15px;font-weight:700;font-family:'DM Sans',system-ui;cursor:pointer">Enter</button>
<p id="pw-err" style="color:#e94560;font-size:12px;margin-top:10px;display:none">Incorrect password</p>
</div>
</div>
<script>
function unlock(){
var p=document.getElementById("pw").value;
// Simple hash check — not crypto-grade but prevents casual access
if(p==="viral2026"||p==="Viral2026"){
document.getElementById("lockscreen").style.display="none";
sessionStorage.setItem("tripauth","1");
}else{
document.getElementById("pw-err").style.display="block";
document.getElementById("pw").value="";
document.getElementById("pw").focus();
}
}
if(sessionStorage.getItem("tripauth")==="1"){
document.getElementById("lockscreen").style.display="none";
}
document.addEventListener("DOMContentLoaded",function(){document.getElementById("pw").focus()});
</script>

const CAT={travel:"#856404",train:"#856404",culture:"#155724",arch:"#155724",food:"#8a4b08",leisure:"#0c5460",show:"#6c3483"};
let activeCity="bcn",expandAll=false;

function render(){
  const city=C.find(c=>c.id===activeCity);
  const w=W[activeCity];

  // Tabs
  document.getElementById("tabs").innerHTML=C.map(c=>
    `<button class="tab${activeCity===c.id?" active":""}" style="${activeCity===c.id?`background:${c.accent||"#e94560"}`:""}" onclick="activeCity='${c.id}';expandAll=false;render()">${c.name}</button>`
  ).join("");

  let html="";

  // City card or flight card
  if(city.nights>0){
    const h=city.htl;
    html+=`<div class="city-card" style="background:linear-gradient(135deg,${city.color},${city.accent})">
      <h2>${city.name}</h2>
      <div class="dates">${city.dates} · ${city.nights} nights</div>
      <div class="hotel">🏨 ${city.hotel}</div>
      ${w?`<div class="weather"><div class="icon">${w.i}</div><div class="temp">${w.hi}°/${w.lo}°</div><div class="wnote">${w.n}</div></div>`:""}
    </div>`;
    if(h){
      html+=`<div class="htl-card" onclick="this.classList.toggle('open')">
        <div class="htl-top"><span class="htl-label">🏨 Reservation</span><span class="htl-toggle">▼</span></div>
        <div class="htl-name">${city.hotel}</div>
        <div class="htl-room">${h.room}${h.notes?" · "+h.notes:""}</div>
        <div class="htl-body">
          <div class="htl-row"><span class="label">Confirmation</span><span class="val">${h.conf}</span></div>
          <div class="htl-row"><span class="label">Address</span><span class="val">${h.addr}</span></div>
          ${h.ph?`<div class="htl-row"><span class="label">Phone</span><span class="val">${h.ph}</span></div>`:""}
          <div class="htl-btns">
            ${h.pdf?`<a class="btn-pdf" href="${h.pdf}" target="_blank" rel="noopener" onclick="event.stopPropagation()">📄 Voucher PDF</a>`:""}
            ${h.ph?`<a class="btn-call" href="tel:${h.ph.replace(/\\s/g,'')}" onclick="event.stopPropagation()">📞 Call Hotel</a>`:""}
            ${h.addr?`<a class="btn-map" href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(city.hotel+' '+h.addr)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">📍 Map</a>`:""}
          </div>
        </div>
      </div>`;
    }
  } else {
    html+=`<div class="flight-card"><h2>✈ Flight Details</h2><div class="sub">Viral · Mansi · Reyansh</div></div>`;
  }

  // Expand/collapse
  if(city.days.length>1){
    html+=`<div class="toolbar"><button class="expand-btn" onclick="expandAll=!expandAll;render()">${expandAll?"Collapse all":"Expand all"}</button></div>`;
  }

  // Days
  city.days.forEach((day,di)=>{
    const isOpen=expandAll||city.days.length===1;
    html+=`<div class="day-header" onclick="this.classList.toggle('open');this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'">
      <div><span class="day-label">${day.label}</span><span class="day-count">${day.a.length}</span>${(()=>{const dw=DW[day.date];return dw?`<span style="margin-left:8px;font-size:11px;color:#888">${dw.i} ${dw.hi}° ${dw.n}</span>`:""})()}</div>
      <span class="day-toggle">${isOpen?"−":"+"}</span>
    </div>`;
    html+=`<div class="day-activities" style="display:${isOpen?"block":"none"}">`;
    day.a.forEach((act,ai)=>{
      const col=CAT[act.cat]||"#0c5460";
      const urg=act.note&&act.note.includes("⚠️");
      const done=act.book&&(act.book.includes("Done")||act.book.includes("✅"));
      const yes=act.book&&(act.book.includes("YES")||act.book.includes("Rec")||act.book.includes("Mezquita")||act.book.includes("Pena"));
      const guru=act.book&&act.book.includes("GuruWalk");
      let badge="";
      if(act.book){
        const cls=done?"done":(yes||guru)?"yes":"other";
        badge=`<span class="badge ${cls}">${act.book}</span>`;
      }
      html+=`<div class="activity${urg?" urgent":""}" style="border-left-color:${urg?"#e74c3c":col}" onclick="this.classList.toggle('open')">
        <div class="act-top">
          <div class="act-main">
            <div class="act-title"><span class="act-icon">${act.icon}</span><span class="act-name">${act.t}</span></div>
            <div class="act-meta">
              ${act.time?`<span class="act-time">${act.time}</span>`:""}
              ${act.cost?`<span class="act-cost">${act.cost}</span>`:""}
              ${badge}
            </div>
          </div>
          <span class="act-arrow">▼</span>
        </div>
        <div class="act-detail">
          ${act.cat2||act.kid?`<div style="display:flex;gap:8px;margin-bottom:6px;flex-wrap:wrap">${act.cat2?`<span style="font-size:11px;background:#e8f4f8;color:#0c5460;padding:2px 8px;border-radius:12px;font-weight:600">${act.cat2}</span>`:""} ${act.kid?`<span style="font-size:11px;background:#fff8e1;color:#856404;padding:2px 8px;border-radius:12px;font-weight:600">Kids ${"★".repeat(act.kid)}${"☆".repeat(5-act.kid)}</span>`:""}</div>`:""}
          ${act.detail?`<p>${act.detail}</p>`:""}
          ${act.note?`<p class="note${urg?" urgent-note":""}">${act.note}</p>`:""}
          <div class="act-buttons">
            ${act.link?`<a class="btn-book" href="${act.link}" target="_blank" rel="noopener" onclick="event.stopPropagation()">🔗 Book</a>`:""}
            ${act.map?`<a class="btn-map" href="${act.map}" target="_blank" rel="noopener" onclick="event.stopPropagation()">📍 Map</a>`:""}
            ${act.guru?`<a class="btn-guru" href="${act.guru}" target="_blank" rel="noopener" onclick="event.stopPropagation()">🚶 GuruWalk</a>`:""}
            ${act.pdf?`<a class="btn-pdf" href="${act.pdf}" target="_blank" rel="noopener" onclick="event.stopPropagation()">📄 Voucher</a>`:""}
          </div>
        </div>
      </div>`;
    });
    html+=`</div>`;
  });

  // Overview on flights tab
  if(city.id==="flights"){
    html+=`<div class="overview"><h3>Trip at a Glance</h3>`;
    C.filter(c=>c.nights>0).forEach(c=>{
      const cw=W[c.id];
      html+=`<div class="ov-row" onclick="activeCity='${c.id}';render()">
        <span class="ov-city">${c.name}</span>
        <span class="ov-info">${cw?cw.i+" "+cw.hi+"°":""} · ${c.nights}N · ${c.hotel.length>18?c.hotel.slice(0,16)+"…":c.hotel}</span>
      </div>`;
    });
    html+=`<div class="ov-total"><span>Total</span><span>21 nights</span></div></div>`;
    html+=`<div class="overview" style="margin-top:10px;border-left:4px solid #e74c3c">
      <h3>🆘 Emergency Contact</h3>
      <div class="htl-row"><span class="label">ACME Travel</span><span class="val">Vaishali Agarwal</span></div>
      <div class="htl-btns" style="margin-top:8px">
        <a class="btn-call" href="tel:+919819815779" style="background:#c0392b">📞 +91 98198 15779</a>
      </div>
    </div>`;
  }

  document.getElementById("content").innerHTML=html;
}

render();
</script>
