<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#f4f2ed;--card:#fff;--text:#1a1a2e;--muted:#888;--border:#eee;--radius:14px}
body{font-family:'DM Sans',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);max-width:480px;margin:0 auto;min-height:100vh;overflow-x:hidden}

/* Header */
.header{background:linear-gradient(135deg,#1a1a2e,#16213e);padding:20px 16px 14px;position:sticky;top:0;z-index:100}
.header h1{color:#fff;font-size:19px;font-weight:800;letter-spacing:-.5px}
.header .sub{color:rgba(255,255,255,.45);font-size:11px;margin-top:3px}
.tabs{display:flex;gap:6px;overflow-x:auto;padding:12px 0 4px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:6px 13px;border-radius:22px;border:none;cursor:pointer;font-size:11.5px;font-weight:700;font-family:inherit;transition:all .15s;background:rgba(255,255,255,.08);color:rgba(255,255,255,.45)}
.tab.active{color:#fff}

/* City card */
.city-card{border-radius:var(--radius);padding:16px;margin-bottom:16px;color:#fff;position:relative;overflow:hidden}
.city-card h2{font-size:22px;font-weight:800}
.city-card .dates{font-size:12px;opacity:.8;margin-top:3px}
.city-card .hotel{font-size:11px;opacity:.65;margin-top:2px}
.weather{text-align:right;background:rgba(255,255,255,.15);border-radius:10px;padding:6px 10px;position:absolute;top:14px;right:14px}
.weather .icon{font-size:22px}
.weather .temp{font-size:13px;font-weight:700}
.weather .wnote{font-size:9px;opacity:.8}

/* Content */
.content{padding:16px 14px}
.toolbar{display:flex;justify-content:flex-end;margin-bottom:8px}
.expand-btn{background:none;border:1px solid #ccc;border-radius:20px;padding:4px 12px;font-size:11px;color:#666;cursor:pointer;font-family:inherit}

/* Day section */
.day-header{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;background:#f8f9fa;border-radius:11px;cursor:pointer;margin-bottom:8px;transition:background .15s}
.day-header:active{background:#eee}
.day-label{font-weight:700;font-size:14px;color:var(--text)}
.day-count{font-size:11px;color:#999;margin-left:8px}
.day-toggle{font-size:16px;color:#aaa;transition:transform .2s}
.day-activities{margin-bottom:14px}

/* Activity card */
.activity{background:var(--card);border-radius:12px;padding:12px 14px;margin-bottom:8px;border-left:4px solid #155724;box-shadow:0 1px 3px rgba(0,0,0,.05);cursor:pointer;transition:box-shadow .15s}
.activity:active{box-shadow:0 1px 6px rgba(0,0,0,.1)}
.activity.urgent{border-left-color:#e74c3c}
.act-top{display:flex;justify-content:space-between;gap:8px}
.act-main{flex:1;min-width:0}
.act-title{display:flex;align-items:center;gap:6px}
.act-icon{font-size:15px}
.act-name{font-weight:600;font-size:13.5px;color:var(--text)}
.act-meta{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap;align-items:center}
.act-time{font-size:11px;background:#f0f0f0;padding:2px 7px;border-radius:20px;color:#555;font-family:'JetBrains Mono',monospace;font-weight:500}
.act-cost{font-size:11px;color:#888}
.badge{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:700}
.badge.done{background:#d4edda;color:#155724}
.badge.yes{background:#fff3cd;color:#856404}
.badge.other{background:#f0f0f0;color:#666}
.act-arrow{font-size:11px;color:#bbb;flex-shrink:0}

/* Expanded */
.act-detail{margin-top:10px;padding-top:10px;border-top:1px solid #f0f0f0;display:none}
.activity.open .act-detail{display:block}
.act-detail p{font-size:12.5px;color:#333;line-height:1.5;white-space:pre-line;margin-bottom:4px}
.act-detail .note{font-size:12px;color:#888;font-style:italic}
.act-detail .note.urgent-note{color:#c0392b;font-style:normal;font-weight:600}
.act-buttons{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.btn-book,.btn-map,.btn-guru{display:inline-block;font-size:12px;color:#fff;padding:6px 13px;border-radius:22px;text-decoration:none;font-weight:600;font-family:inherit}
.btn-book{background:#2563eb}
.btn-map{background:#16a085}
.btn-guru{background:#e67e22}

/* Hotel detail card */
.htl-card{background:var(--card);border-radius:var(--radius);padding:14px 16px;margin-bottom:14px;border:1px solid #e8e8e8;cursor:pointer}
.htl-card .htl-top{display:flex;justify-content:space-between;align-items:center}
.htl-card .htl-label{font-size:11px;color:#888;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.htl-card .htl-toggle{font-size:11px;color:#bbb}
.htl-card .htl-name{font-size:14px;font-weight:700;margin-top:4px}
.htl-card .htl-room{font-size:12px;color:#666;margin-top:2px}
.htl-body{display:none;margin-top:10px;padding-top:10px;border-top:1px solid #f0f0f0}
.htl-card.open .htl-body{display:block}
.htl-row{display:flex;justify-content:space-between;padding:4px 0;font-size:12px}
.htl-row .label{color:#888}
.htl-row .val{color:#333;font-weight:500;text-align:right;max-width:60%}
.htl-btns{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.btn-pdf{display:inline-block;font-size:12px;color:#fff;background:#8e44ad;padding:6px 13px;border-radius:22px;text-decoration:none;font-weight:600;font-family:inherit}
.btn-call{display:inline-block;font-size:12px;color:#fff;background:#2c3e50;padding:6px 13px;border-radius:22px;text-decoration:none;font-weight:600;font-family:inherit}

/* Flight card */
.flight-card{background:#1a1a2e;border-radius:var(--radius);padding:16px;margin-bottom:16px;color:#fff}
.flight-card h2{font-size:18px;font-weight:800;margin-bottom:4px}
.flight-card .sub{font-size:11px;opacity:.55}

/* Overview */
.overview{background:var(--card);border-radius:var(--radius);padding:14px;margin-top:10px}
.overview h3{font-size:13px;font-weight:700;margin-bottom:10px}
.ov-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f0f0f0;font-size:12px;cursor:pointer}
.ov-row:last-child{border-bottom:none}
.ov-city{font-weight:600}
.ov-info{color:#888}
.ov-total{display:flex;justify-content:space-between;padding:10px 0 0;font-size:14px;font-weight:700}

/* Smooth transitions */
.day-activities{overflow:hidden;transition:max-height .3s ease}

/* Travel connector */
.travel-strip{display:flex;align-items:center;gap:8px;padding:4px 14px;margin:-4px 0 4px 14px;font-size:11px;color:#666;border-left:2px dashed #ccc;line-height:1.4}
.travel-strip .ts-best{color:#1a1a2e;font-weight:600}
.travel-strip .ts-alt{color:#888;font-size:10.5px}
.travel-strip .ts-sep{color:#bbb;margin:0 2px}
</style>
</head>

<div id="lockscreen" style="position:fixed;top:0;left:0;right:0;bottom:0;background:linear-gradient(135deg,#1a1a2e,#16213e);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px">
<div style="text-align:center;max-width:320px;width:100%">

<p style="color:rgba(255,255,255,.45);font-size:12px;margin:0 0 24px">Enter password to continue</p>
<input id="pw" type="password" placeholder="Password" autocomplete="off"
style="width:100%;padding:14px 18px;border-radius:12px;border:2px solid rgba(255,255,255,.15);background:rgba(255,255,255,.08);color:#fff;font-size:16px;font-family:'DM Sans',system-ui;outline:none;text-align:center;letter-spacing:2px"
onkeydown="if(event.key==='Enter')unlock()">
<button onclick="unlock()"
style="width:100%;margin-top:12px;padding:14px;border-radius:12px;border:none;background:#e94560;color:#fff;font-size:15px;font-weight:700;font-family:'DM Sans',system-ui;cursor:pointer">Enter</button>
<p id="pw-err" style="color:#e94560;font-size:12px;margin-top:10px;display:none">Incorrect password</p>
</div>
</div>
<script>
function unlock(){
var p=document.getElementById("pw").value;
// Simple hash check — not crypto-grade but prevents casual access
if(p==="viral2026"||p==="Viral2026"){
document.getElementById("lockscreen").style.display="none";
sessionStorage.setItem("tripauth","1");
}else{
document.getElementById("pw-err").style.display="block";
document.getElementById("pw").value="";
document.getElementById("pw").focus();
}
}
if(sessionStorage.getItem("tripauth")==="1"){
document.getElementById("lockscreen").style.display="none";
}
document.addEventListener("DOMContentLoaded",function(){document.getElementById("pw").focus()});
</script>

{t:"🎭 Tablao Cordobes Flamenco",time:"17:40–18:50",cat:"show",icon:"🎭",detail:"Flamenco + drink. La Rambla 35.\nTICKET: 5:40 PM. Arrive 10 min early.\nRef: GYGN6B5LH74H",note:"Cancel before 5:40PM May 30",cost:"€45-55 (paid)",book:"✅ Booked",link:"https://tablaocordobes.com/en/",map:"https://www.google.com/maps/search/?api=1&query=Tablao+Cordobes+Barcelona",guru:"",pdf:"https://github.com/viralnb/spain2026/raw/main/docs/Viral%20Flamenco%20Tablao%2031May26.pdf",kid:4,cat2:"Flamenco Show",next:{best:"🚶 Walk on La Rambla",alt:""}},
{t:"La Rambla stroll + dinner",time:"19:00–21:00",cat:"leisure",icon:"🚶",detail:"Boqueria market closes ~20:00 — pop in for a juice or jamón. Dinner anywhere on/near La Rambla or Plaça Reial.",note:"",cost:"€25-35",book:"",link:"",map:"https://www.google.com/maps/search/?api=1&query=La+Rambla+Barcelona",guru:"",kid:4,cat2:"Leisure",next:{best:"🚇 Metro L3 Drassanes→Diagonal 15 min · €3.75 family",alt:"🚕 Taxi 15 min · ~€12"}}
]},
{date:"1 Jun",label:"Jun 1, Mon — Sagrada, Camp Nou & Sunset",a:[
{t:"🚇 Hotel → Sagrada Família",time:"08:15",cat:"travel",icon:"🚇",detail:"Metro L5 from Diagonal (2 min walk from hotel on Balmes) → Sagrada Família station (15 min).\nMeeting point is at Carrer de Nàpols 218 — a 5-min walk from the metro exit.\nLeave hotel by 08:15 to reach meeting point by 08:45.",note:"Carrer de Nàpols 218 is the Amigo Tours meeting point — NOT the main ticket entrance.",cost:"€3.75 family",book:"",link:"",map:"https://www.google.com/maps/search/?api=1&query=Carrer+de+Napols+218+Eixample+Barcelona",guru:""},
{t:"⛪ Sagrada Família — Guided Tour + Tower",time:"09:15–11:00",cat:"arch",icon:"⛪",detail:"Amigo Tours bilingual guided tour (English/Spanish) WITH Tower access.\nMEETING POINT: Carrer de Nàpols, 218, Eixample — NOT the main entrance.\nArrive by 08:45 (30 min before departure).\nRef: 102-20697607 · TourCMS: 16113-9892 · File TO: TBO25052026173410579\n📱 Download Amigo App before arriving. Bring voucher + photo ID.\nTour runs 09:15–11:00 (~2 hrs). Tower: lift up, spiral staircase down.\n⚠️ Rain = no tower access (tower fee refunded in that case).",note:"⚠️ ARRIVE 08:45 at Carrer de Nàpols 218. Amigo App required. Rain closes towers — refund applies.",cost:"Pre-paid",book:"✅ Booked",link:"https://sagradafamilia.org/en/tickets",map:"https://www.google.com/maps/search/?api=1&query=Carrer+de+Napols+218+Eixample+Barcelona",guru:"",pdf:"https://github.com/viralnb/spain2026/raw/main/docs/Viral_Sagrada_01Jun26_0915.pdf",kid:5,cat2:"Cathedral / Architecture",next:{best:"🚕 Taxi to Barceloneta 15 min · ~€12",alt:"🚇 Metro L5→L4 20 min · €3.75 family"}},
{t:"Lunch near Sagrada or Barceloneta",time:"12:15–13:45",cat:"food",icon:"🍽",detail:"Quick lunch near Sagrada (Av. de Gaudí restaurants) — OR taxi straight to Barceloneta for seafood paella before Camp Nou.",note:"Camp Nou ticket window is 2:30 PM ± 1 hour, so don't dawdle",cost:"€15-25",book:"",link:"",map:"https://www.google.com/maps/search/?api=1&query=Barceloneta+restaurants",guru:"",kid:4,cat2:"Food",next:{best:"🚕 Taxi to Camp Nou 20 min · ~€18",alt:"🚇 Metro L3 25 min · €3.75 family"}},
{t:"★ Camp Nou — FC Barcelona",time:"14:30–17:30",cat:"leisure",icon:"⚽",detail:"Barça Immersive Tour. Access nº15.\nTICKET: 2:30 PM (±1hr). Ref: GYG996376FFQ.\nBring headphones + charged phone.\nImmersive Tour runs ~2.5-3 hrs.",note:"Non-refundable. Spotify Camp Nou under renovation — Immersive Tour at the museum nearby.",cost:"€28/€22 (paid)",book:"✅ Booked",link:"https://www.fcbarcelona.com/en/tickets/camp-nou-experience",map:"https://www.google.com/maps/search/?api=1&query=Camp+Nou+Barcelona",guru:"",pdf:"https://github.com/viralnb/spain2026/raw/main/docs/Viral%20FC%20BCN%20Tour%2001Jun26.pdf",kid:5,cat2:"Sport / Culture",next:{best:"🚕 Taxi to Bunkers 15 min · ~€15",alt:"🚌 Bus V17 35 min · €3.75 family"}},
{t:"★ Bunkers del Carmel — sunset",time:"18:30–20:00",cat:"leisure",icon:"🌇",detail:"Free 360° panoramic viewpoint — locals' favorite spot. Former WWII anti-aircraft bunkers on Turó de la Rovira hill.\nGetting there: Bus V17 or 119, or taxi (10 min from Camp Nou direction via Carmel). Last bit is uphill — wear comfy shoes.\nBring water + something to sit on (concrete platforms).",note:"Sunset ~21:15 in early June — arrive 18:30 for golden hour. Magic Fountain is closed Mondays so this is the best sunset option.",cost:"FREE",book:"",link:"",map:"https://www.google.com/maps/search/?api=1&query=Bunkers+del+Carmel+Barcelona",guru:"",kid:4,cat2:"Viewpoint",next:{best:"🚕 Taxi to El Born 20 min · ~€15",alt:"🚌 Bus 119+L4 35 min · €3.75 family"}},
{t:"El Born dinner",time:"20:30–22:00",cat:"food",icon:"🍷",detail:"Lively medieval quarter east of Gothic Q. Tapas, vermut bars, narrow lanes.\nPicks: El Xampanyet (cured meats & cava), Cal Pep (seafood counter — go early), Bormuth (modern tapas).",note:"Reyansh-friendly options at most spots; Bormuth has biggest menu",cost:"€25-40",book:"",link:"",map:"https://www.google.com/maps/search/?api=1&query=El+Born+Barcelona+restaurants",guru:"",kid:4,cat2:"Food / Nightlife",next:{best:"🚇 Metro L4 Jaume I→L3→Diagonal 15 min · €3.75 family",alt:"🚕 Taxi 15 min · ~€13"}}
]},
{date:"2 Jun",label:"Jun 2, Tue — Tibidabo, El Born & Depart",a:[
{t:"🚇 Hotel → Tibidabo",time:"09:15",cat:"travel",icon:"🚇",detail:"Metro L3 from Diagonal → Plaça Catalunya (10 min), then FGC L7 from Pl.Catalunya → Peu del Funicular (30 min), then Funicular de Tibidabo up to the park (~5 min). Total: ~50 min.\nAlternatively: Tram Blau from Av. Tibidabo (more scenic, weekends/summer only).",note:"Leave hotel by 09:15 to arrive at park opening ~10:30",cost:"~€8 family (FGC + funicular)",book:"",link:"",map:"https://www.google.com/maps/search/?api=1&query=Peu+del+Funicular+Tibidabo+Barcelona",guru:""},
{t:"★ Tibidabo Amusement Park",time:"10:00–13:30",cat:"leisure",icon:"🎡",detail:"Vintage rides, panoramic views. Cuca de Llum funicular up from Plaça Doctor Andreu. Park opens 11:00 — arrive 10:30 to ride up.\nTuesdays are one of the QUIETEST days — far better than Sat. Most rides walk-on.",note:"Open Wed-Sun in summer (Jun 27 onwards), but Tue 2 Jun is during the weekend-only spring schedule — verify on tibidabo.cat",cost:"€35/€14",book:"⚠️ CHECK",link:"https://www.tibidabo.cat/en",map:"https://www.google.com/maps/search/?api=1&query=Tibidabo+Barcelona",guru:"",kid:5,cat2:"Amusement Park",next:{best:"🚇 Funicular+Tram Blau+FGC L7 50 min · €11.25 family",alt:"🚕 Taxi 25 min · ~€25"}},
{t:"Lunch & check-out from hotel",time:"13:30–15:00",cat:"food",icon:"🍽",detail:"Lunch near hotel or in El Born. Hotel can store bags after check-out.",note:"",cost:"€12-18",book:"",link:"",map:"",guru:"",next:{best:"🚶 Walk 10 min OR 🚇 Metro to Jaume I",alt:""}},
{t:"★ Picasso Museum",time:"15:30–17:00",cat:"culture",icon:"🎨",detail:"Largest collection of Picasso's early works (1890s-1900s). Housed in 5 medieval palaces in El Born.\nFree for under-18. Adults €14. Skip-the-line if booked online.",note:"Indoor & cool — perfect for siesta hours. Tue can be busy; book a 15:30 slot online beforehand.",cost:"€14 / free <18",book:"Rec",link:"https://www.museupicassobcn.cat/en",map:"https://www.google.com/maps/search/?api=1&query=Picasso+Museum+Barcelona",guru:"",kid:3,cat2:"Art Museum",next:{best:"🚶 Walk 5 min in El Born",alt:""}},
{t:"Santa Maria del Mar + El Born CC",time:"17:00–18:30",cat:"culture",icon:"⛪",detail:"Santa Maria del Mar — stunning Catalan Gothic church, the 'people's cathedral'. Free entry to nave; €10 for tower & rooftop tour.\nNearby: El Born Cultural Centre has 17th-century Barcelona ruins under glass floors (free entry to the archeological site).",note:"5 min walk from Picasso Museum",cost:"Free / €10",book:"",link:"https://www.santamariadelmarbarcelona.com/",map:"https://www.google.com/maps/search/?api=1&query=Santa+Maria+del+Mar+Barcelona",guru:"",kid:3,cat2:"Architecture / History",next:{best:"🚶 Walk 15 min to hotel",alt:""}},
{t:"Collect bags + early dinner",time:"18:30–19:30",cat:"food",icon:"🧳",detail:"Back to hotel for bags. Quick dinner before train.",note:"",cost:"€12-18",book:"",link:"",map:"",guru:"",next:{best:"🚇 Metro L3 to Sants 15 min · €3.75 family",alt:"🚕 Taxi 10 min · ~€12"}},
{t:"🚆 Sants → PortAventura",time:"~19:00–20:30",cat:"train",icon:"🚆",detail:"Rodalies R16 direct to PortAventura station",note:"Hotel Adventura late evening",cost:"~€8-10pp",book:"Renfe",link:"https://www.renfe.com/es/en",map:"https://www.google.com/maps/search/?api=1&query=Barcelona+Sants+station",guru:"",kid:5,cat2:"Theme Park"}
]}
]},

{id:"vlc",name:"Valencia",color:"#2980b9",accent:"#3498db",dates:"4 – 7 Jun",nights:3,hotel:"SH Ingles Boutique",htl:{room:"Superior Double + Extra Bed",conf:"H23HB0539/1252284485",addr:"Carrer del Marquès de Dos Aigües 6, Ciutat Vella",ph:"+34 963516426",pdf:"https://github.com/viralnb/spain2026/raw/main/docs/VIRAL%20BERAWALA%20HV%20VOUCHER%20Valencia%20SPAIN%204%20june-07%20JUN.docx.pdf",notes:"Room Only"},days:[
{date:"5 Jun",label:"Jun 5, Fri — Science City",a:[
{t:"🚌 Hotel → Museu de les Ciències",time:"09:00",cat:"travel",icon:"🚌",detail:"Bus 13 from Colón (2 min walk from SH Ingles) to Ciudad de les Arts i les Ciències — ~25 min.\nAlternatively: taxi ~€8-10, 10 min.\nThe Museu, Hemisfèric and Oceanogràfic are all in the same complex on arrival.",note:"Buy/validate ticket at the Museu before the 11:00 Hemisfèric show",cost:"€4.50 family (bus) or €8 (taxi)",book:"",link:"",map:"https://www.google.com/maps/search/?api=1&query=Museu+de+les+Ciencies+Valencia",guru:""},
{t:"Museu de les Ciències",time:"09:30–10:45",cat:"arch",icon:"🏛",detail:"Calatrava's interactive science museum. Self-guided.\nBooking refs: 13384183/38272411 (Adult), /38272412 (Adult), /38272413 (Child 4-12).\nTixalia/B98323264. Mobile entry — direct through turnstiles.\nArrive ~30 min before Hemisfèric show.",note:"Combo ticket already covers Museu + Hemisfèric + Oceanogràfic",cost:"Pre-paid",book:"✅ Booked",link:"https://www.cac.es/en/buy-tickets/",map:"https://www.google.com/maps/search/?api=1&query=Museu+de+les+Ciencies+Valencia",guru:"",pdf:"https://github.com/viralnb/spain2026/raw/main/docs/Museu_de_les_Ciencies.pdf",kid:5,cat2:"Science / Architecture",next:{best:"🚶 Walk 5 min to Hemisfèric",alt:""}},
{t:"🎬 Hemisfèric — \"Postales de otros mundos\"",time:"11:00–12:00",cat:"culture",icon:"🎬",detail:"IMAX dome show inside Calatrava's eye-shaped building. Show: \"Postales de otros mundos\" (Postcards from Other Worlds).\nFIXED TIME — don't be late. Tixalia/B98323264.",note:"⚠️ Likely Spanish-language. Check if English audio headsets are available at entry.",cost:"Pre-paid",book:"✅ Booked",link:"https://www.cac.es/en/hemisferic/",map:"https://www.google.com/maps/search/?api=1&query=Hemisferic+Valencia",guru:"",pdf:"https://github.com/viralnb/spain2026/raw/main/docs/Museu_de_les_Ciencies.pdf",kid:4,cat2:"IMAX Show",next:{best:"🚶 Walk 2 min to La Terraza",alt:""}},
{t:"Lunch — La Terraza / Museu area",time:"12:15–13:30",cat:"food",icon:"🍽",detail:"La Terraza or Museo Trattoria right between Museu & Hemisfèric.",note:"",cost:"€12-18",book:"",link:"",map:"https://www.google.com/maps/search/?api=1&query=La+Terraza+Ciudad+Artes+Ciencias",guru:"",kid:4,cat2:"Food",next:{best:"🚶 Walk 10 min to Turia / 🚌 Bus 25 min · €4.50 family",alt:""}},
{t:"★ Turia Gardens + Gulliver",time:"14:00–16:00",cat:"leisure",icon:"🚲",detail:"9 km park along the old riverbed. Giant Gulliver playground — kids climb all over him.",note:"Cut short today to fit Albufera sunset",cost:"Bike ~€10/hr",book:"",link:"",map:"https://www.google.com/maps/search/?api=1&query=Gulliver+playground+Valencia",guru:"",kid:5,cat2:"Park / Playground",next:{best:"🚌 Bus 25 to El Palmar 45 min · €4.50 family",alt:"🚕 Taxi 20 min · ~€20"}},
{t:"★ Albufera lagoon — sunset boat + paella",time:"17:00–21:30",cat:"leisure",icon:"🌅",detail:"Albufera Natural Park is 20 min south of Valencia (Bus 25 from Hotel SH Ingles, ~45 min, ~€2.50pp; or taxi ~€20 each way; or organized half-day tours from town).\n\nFLOW:\n• 17:00 — bus/taxi to El Palmar village\n• 17:45 — traditional 'albufera' wooden boat ride on the lagoon (~30-40 min, ~€4-5pp)\n• 18:30 — explore El Palmar village\n• 19:30 — paella dinner at a traditional restaurant in El Palmar (Bon Aire, Nou Racó, or Casa Salvadora). This is the birthplace of paella — order paella valenciana (chicken+rabbit) not seafood!\n• Sunset over the lagoon ~21:00\n• Last bus 25 back ~22:30 (verify on the day) or pre-book taxi",note:"⚠️ Spanish paella takes 30+ min to cook — order as soon as you sit",cost:"~€60 family",book:"Rec",link:"https://www.albuferavalencia.com/en/",map:"https://www.google.com/maps/search/?api=1&query=El+Palmar+Albufera+Valencia",guru:"",kid:5,cat2:"Nature / Food",next:{best:"🚕 Taxi back to hotel 20 min · ~€20",alt:"🚌 Last bus 25 ~22:30 · €4.50 family"}}
]},
{date:"6 Jun",label:"Jun 6, Sat — Oceanogràfic & Beach",a:[
{t:"🚌 Hotel → Oceanogràfic",time:"09:30",cat:"travel",icon:"🚌",detail:"Bus 13 from Colón (near SH Ingles) to Ciudad de les Arts i les Ciències ~25 min.\nOceanogràfic is at the south end of the complex — follow signs from bus stop.\nAlternatively: taxi ~€8-10, 10 min.",note:"Mobile tickets — go direct to turnstiles on arrival",cost:"€4.50 family (bus) or €8 (taxi)",book:"",link:"",map:"https://www.google.com/maps/search/?api=1&query=Oceanografic+Valencia",guru:""},
{t:"Oceanogràfic (combo ticket)",time:"10:00–14:00",cat:"leisure",icon:"🐬",detail:"Europe's largest aquarium. Dolphins, shark tunnel, Arctic dome, sea lions.\nEntry from 10:00. Same booking refs as Museu/Hemisfèric: 38272411/12/13. Tixalia/B98323264.\nMobile entry — direct through turnstiles.",note:"Allow 4 hrs minimum. See dolphin show schedule on arrival.",cost:"Pre-paid",book:"✅ Booked",link:"https://www.oceanografic.org/en/buy-tickets/",map:"https://www.google.com/maps/search/?api=1&query=Oceanografic+Valencia",guru:"",pdf:"https://github.com/viralnb/spain2026/raw/main/docs/Museu_de_les_Ciencies.pdf",kid:5,cat2:"Aquarium",next:{best:"🚇 Metro L7 to Colón 20 min · €4.50 family",alt:"🚕 Taxi 10 min · ~€10"}},
{t:"Lunch inside Oceanogràfic or nearby",time:"13:00–14:00",cat:"food",icon:"🍽",detail:"Underwater restaurant Submarino if budget allows, or food courts on-site",note:"",cost:"€15-30",book:"",link:"",map:"",guru:"",kid:4,cat2:"Food",next:{best:"🚇 Metro L7 to old town 15 min · €4.50 family",alt:""}},
{t:"La Lonja + Cathedral + Miguelete",time:"15:30–17:30",cat:"culture",icon:"🏛",detail:"La Lonja = stunning Gothic (UNESCO). Holy Grail chapel in Cathedral. Climb Miguelete tower.",note:"All walking distance from hotel",cost:"€8-12",book:"",link:"",map:"https://www.google.com/maps/search/?api=1&query=La+Lonja+Valencia",guru:"",kid:4,cat2:"Culture / History",next:{best:"🚌 Bus 32 to Malvarrosa 25 min · €4.50 family",alt:"🚕 Taxi 12 min · ~€10"}},
{t:"Old Town stroll + dinner",time:"19:00–21:30",cat:"food",icon:"🏛",detail:"Plaza de la Reina, Cathedral lit up at night. Hotel SH Ingles is right in this neighborhood — easy walk back.\nDinner picks: Central Bar by Ricard Camarena (in Mercado Central building), Canalla Bistro, or any tapas spot on Calle de la Tapinería.",note:"Paella already covered at Albufera on Fri — go for tapas tonight",cost:"€15-25",book:"",link:"",map:"https://www.google.com/maps/search/?api=1&query=Plaza+de+la+Reina+Valencia",guru:"",kid:4,cat2:"Leisure / Food"}
]},

{t:"🚌 Hotel → Bioparc Valencia",time:"09:30",cat:"travel",icon:"🚌",detail:"Bus 95 from Av. del Regne de València (3 min walk from hotel) to Bioparc — ~20 min.\nAlternatively: taxi ~€10, 12 min.",note:"Bioparc is west of the old town",cost:"€4.50 family (bus) or €10 (taxi)",book:"",link:"",map:"https://www.google.com/maps/search/?api=1&query=Bioparc+Valencia",guru:""},
{t:"★ Bioparc Valencia",time:"10:00–13:00",cat:"leisure",icon:"🦁",detail:"No cages — immersive African habitats (savanna, Madagascar, equatorial forest). One of Europe's best zoos for kids.",note:"Was originally Sat — moved here since Sat is the Oceanogràfic day per booking",cost:"€27/€21",book:"Rec",link:"https://www.bioparcvalencia.es/en/tickets/",map:"https://www.google.com/maps/search/?api=1&query=Bioparc+Valencia",guru:"",kid:5,cat2:"Zoo / Nature",next:{best:"🚌 Bus 95 to Mercado 25 min · €4.50 family",alt:"🚕 Taxi 12 min · ~€10"}},
{t:"Mercado Central + lunch",time:"13:30–15:00",cat:"food",icon:"🍊",detail:"Europe's largest fresh food market. Closes ~15:00 — go straight from Bioparc. Try horchata & fartons.",note:"",cost:"€10-15",book:"",link:"",map:"https://www.google.com/maps/search/?api=1&query=Mercado+Central+Valencia",guru:"",kid:4,cat2:"Food Market",next:{best:"🚇 Metro L3 to Joaquín Sorolla 15 min · €4.50 family",alt:"🚕 Taxi 8 min · ~€8"}},

{t:"🚶 Hotel → Plaza de Oriente (GuruWalk)",time:"09:45",cat:"travel",icon:"🚶",detail:"Hotel Meninas (Campomanes 7) is 5 min walk to Plaza de Oriente — turn right onto Calle del Arenal, past the Teatro Real, into the plaza.\nThe GuruWalk meeting point is typically at the statue of Felipe IV in the centre of the plaza.",note:"Check the specific meeting point when booking the GuruWalk",cost:"FREE (walk)",book:"",link:"",map:"https://www.google.com/maps/search/?api=1&query=Plaza+de+Oriente+Madrid",guru:""},
{t:"★ Madrid de los Austrias GuruWalk",time:"10:00–12:30",cat:"culture",icon:"🏛",detail:"Free walking tour of Madrid's Hapsburg Quarter — Royal Palace area, Almudena Cathedral, Plaza de Oriente, Plaza Mayor, Mercado de San Miguel. A guide knits these sites into a 500-year story you'd miss self-guided.\nMeeting point usually near Plaza de Oriente or Plaza Mayor (varies by tour — confirm when booking). Tip €10-15pp.",note:"⚠️ Royal Palace interior NOT included — book separately if you want to go inside (€12, free <5). Most tours skip interiors to keep moving.",cost:"Tip-based (€30-45 family)",book:"GuruWalk",link:"",map:"https://www.google.com/maps/search/?api=1&query=Madrid+de+los+Austrias",guru:"https://www.guruwalk.com/madrid/tag/austrias",kid:3,cat2:"Walking Tour",next:{best:"🚶 Same area — walk to Mercado",alt:""}},
{t:"Royal Palace interior (optional add-on)",time:"12:45–14:00",cat:"culture",icon:"👑",detail:"One of largest palaces in Europe. Audio guide available. Decide on the day based on energy — kids may have peaked after the walk.",note:"Free for under-5. Closed during state events — check on the day.",cost:"€12 / free <5",book:"Optional",link:"https://www.patrimonionacional.es/en/visit/royal-palace-madrid",map:"https://www.google.com/maps/search/?api=1&query=Royal+Palace+Madrid",guru:"",kid:3,cat2:"Palace",next:{best:"🚶 Walk 8 min to Mercado",alt:""}},

{t:"🚶 Hotel → Real Alcázar",time:"10:00",cat:"travel",icon:"🚶",detail:"Numa Solea (Alfonso XII 27) to Puerta del León entrance of the Alcázar: ~20 min walk through Parque de María Luisa — beautiful morning route.\nAlternatively: taxi ~€7, 8 min. Or Bolt (ride-hailing).",note:"Arrive at Puerta del León by 10:15 for your 10:30 slot",cost:"Free (walk) or €7 (taxi)",book:"",link:"",map:"https://www.google.com/maps/search/?api=1&query=Real+Alcazar+Puerta+del+Leon+Seville",guru:""},
{t:"Real Alcázar de Sevilla",time:"10:30–13:00",cat:"culture",icon:"🕌",detail:"Moorish palace + gardens. GoT location.\nTICKET: 10:30 Puerta del León. Ref: 23780190/30618073",note:"Arrive 10:15 AM. Non-refundable.",cost:"€14.50/free <14",book:"✅ Booked",link:"https://www.alcazarsevilla.org/en/",map:"https://www.google.com/maps/search/?api=1&query=Real+Alcazar+Seville",guru:"",pdf:"https://github.com/viralnb/spain2026/raw/main/docs/Viral%20Alcazar%2012Jun26%201030am.pdf",kid:5,cat2:"Palace / Gardens",next:{best:"🚶 Walk 3 min to Cathedral",alt:""}},

{date:"13 Jun",label:"Jun 13, Sat — Córdoba Day Trip",a:[
{t:"🚕 Hotel → Santa Justa Station (Córdoba AVE)",time:"08:00",cat:"travel",icon:"🚕",detail:"Taxi/Bolt from Numa Solea (Alfonso XII 27) to Santa Justa station: ~10 min, ~€7.\nAlternatively: 15 min walk north on Av. de Menéndez Pelayo.\nAVE to Córdoba: ~45 min. Book ticket in advance on Renfe.com — trains run frequently from ~08:30.",note:"Pack water + hats — Córdoba will be hotter than Seville today (36°C+)",cost:"€7 (taxi) or walk 15 min",book:"",link:"https://www.renfe.com/es/en",map:"https://www.google.com/maps/search/?api=1&query=Seville+Santa+Justa+station",guru:""},
{t:"★ Mezquita-Catedral de Córdoba",time:"10:00–12:30",cat:"culture",icon:"🕌",detail:"Ref: R100078981 · 10:00 entry · Audio guide included.\n3 tickets: 2× General (€20) + 1× Child (€13) = €53 total.\n\n⚠️ AUDIO GUIDE PICKUP FIRST: Go to the Information & Reception Centre at 'Patio de San Eulogio', Calle Torrijos (corner of Calle Amador de los Ríos) — this is SEPARATE from the main entrance.\nMain entrance: C/Cardenal Herrero nº 1.\n\nRules: No hats/caps (!) · No large bags · Modest clothing (holy place) · No eating/drinking · Children 7-14 must be accompanied at all times.",note:"⚠️ No hats inside — bring a cap for outside only. Remove before entry.",cost:"€53 paid",book:"✅ Booked",link:"https://mezquita-catedraldecordoba.es/en/",map:"https://www.google.com/maps/search/?api=1&query=Mezquita+Cathedral+Cordoba+C+Cardenal+Herrero",guru:"",pdf:"https://github.com/viralnb/spain2026/raw/main/docs/Tickets_-_MezquitaDeCordoba_100078981_.pdf",kid:4,cat2:"UNESCO / Architecture",next:{best:"🚶 Walk 5 min to Jewish Quarter",alt:""}},
{t:"Jewish Quarter (Judería) + Synagogue",time:"12:30–13:30",cat:"culture",icon:"🕍",detail:"Medieval Jewish Quarter — one of the best preserved in Spain. Winding whitewashed lanes, flower-filled patios.\nHighlight: the 14th-century Córdoba Synagogue (one of only 3 surviving medieval synagogues in Spain). Entry €0.30.\nAlso: Calleja de las Flores (the famous flower-lined alley, 2 min walk from Mezquita).",note:"Stay in the shade — Córdoba will be 36°C+",cost:"€0.30 synagogue",book:"",link:"",map:"https://www.google.com/maps/search/?api=1&query=Jewish+Quarter+Cordoba",guru:"",kid:4,cat2:"History / Culture",next:{best:"🚶 Walk 8 min to Alcázar",alt:""}},
{t:"Lunch in Córdoba",time:"13:30–14:30",cat:"food",icon:"🍽",detail:"Eat before the Alcázar in the shade. Good spots near the Judería: Taberna Salinas (traditional, atmospheric), Casa Mazal (Jewish Quarter, lovely patio), or any of the small tapas bars on Calle Deanes.",note:"Córdoba's local dishes: salmorejo (thick cold tomato soup — better than gazpacho), flamenquín (pork roll). Try both.",cost:"€12-18",book:"",link:"",map:"https://www.google.com/maps/search/?api=1&query=restaurants+near+Mezquita+Cordoba",guru:"",kid:4,cat2:"Food",next:{best:"🚶 Walk 5 min to Alcázar",alt:""}},
{t:"Alcázar de los Reyes Cristianos",time:"14:30–16:00",cat:"culture",icon:"🏰",detail:"Christian palace and gardens built by Alfonso XI in 1328. Beautiful terraced gardens with fountains — cooler than wandering streets in the afternoon heat.\nMosaics, Roman sarcophagi, and river views from the towers.\nFree for under-14.",note:"Less crowded in the afternoon. Gardens are the highlight.",cost:"€5 adult / free <14",book:"",link:"https://www.turismodecordoba.org/en/alcazar-de-los-reyes-cristianos",map:"https://www.google.com/maps/search/?api=1&query=Alcazar+Reyes+Cristianos+Cordoba",guru:"",kid:4,cat2:"Palace / Gardens",next:{best:"🚶 Walk 15 min or 🚕 Taxi 5 min to Córdoba station",alt:""}},
{t:"🚆 Córdoba → Seville (AVE)",time:"~16:30–17:15",cat:"train",icon:"🚆",detail:"AVE return to Seville Santa Justa — 45 min. Multiple departures from ~16:00 onwards.\nBook return ticket on Renfe when booking the outbound — same day return is fine.",note:"Book the return trip on Renfe",cost:"~€15-25pp",book:"Renfe",link:"https://www.renfe.com/es/en",map:"https://www.google.com/maps/search/?api=1&query=Cordoba+railway+station",guru:"",next:{best:"🚕 Taxi from Santa Justa to hotel 10 min · ~€7",alt:"🚶 Walk 15 min to Numa Solea"}},
{t:"Rest at hotel",time:"17:30–19:00",cat:"leisure",icon:"🛌",detail:"Back to Numa Solea. Freshen up — it's been a hot day in Córdoba.",note:"",cost:"",book:"",link:"",map:"",guru:"",next:{best:"🚶 Walk 20 min OR 🚕 Taxi 8 min to Triana",alt:""}},
{t:"★ Triana GuruWalk + tapas dinner",time:"19:00–21:30",cat:"food",icon:"🌉",detail:"Free walking tour of Triana — Seville's gypsy/flamenco/ceramics neighborhood across the Guadalquivir. The Triana guruwalk covers Mariners' Chapel, Plaza del Altozano, Callejón de la Inquisición, Triana Bridge (oldest iron bridge in Spain). ~1.5-2 hrs.\nEnd with tapas at any classic Triana spot — Las Golondrinas, Casa Cuesta, or Bar Santa Ana.",note:"Cooler in evening (still ~30°C). After Córdoba day trip you'll be tired — gauge energy. Skip and just do tapas if needed.",cost:"Tip €10-15pp + dinner €20-30",book:"GuruWalk",link:"",map:"https://www.google.com/maps/search/?api=1&query=Triana+Seville",guru:"https://www.guruwalk.com/seville/tag/triana",kid:4,cat2:"Walking Tour / Food",next:{best:"🚕 Bolt/taxi to Numa Solea 8 min · ~€8",alt:"🚶 Walk 30 min via Triana Bridge + Parque María Luisa"}}
]},
{date:"14 Jun",label:"Jun 14, Sun — Fly to Porto",a:[
{t:"🚕 Taxi to SVQ Airport",time:"07:30",cat:"travel",icon:"🚕",detail:"Pack bags the night before — early start!\nNuma Solea (Alfonso XII 27) to SVQ is ~20-25 min.\nDepart hotel by 07:30 to reach airport by ~08:00 — allows 1h 50m before the 09:50 departure.\n⚠️ Do Ryanair online check-in the evening before (Jun 13) via the Ryanair App.",note:"⚠️ Ryanair REQUIRES app check-in — no printed boarding passes accepted.",cost:"€20-25",book:"",link:"",map:"https://www.google.com/maps/search/?api=1&query=Seville+Airport+SVQ",guru:"",next:{best:"✈ FR5466 09:50 SVQ→OPO",alt:""}},
{t:"✈ FR5466 Seville → Porto (Ryanair)",time:"09:50–10:05",cat:"travel",icon:"✈",detail:"Ryanair FR5466 · SVQ → OPO\nDeparture: 09:50 · Arrival: 10:05 (1h 15m)\nSeats: 25D (Viral) · 25E (Reyansh) · 25F (Mansi)\nBaggage: 20 kg checked bag + Priority & 2 cabin bags — each passenger\nPNR: RVKQHC\n📱 Boarding pass: Ryanair App ONLY — they no longer accept printed passes.",note:"⚠️ BOARDING PASS via Ryanair App. Check in online before arriving at airport.",cost:"Pre-paid",book:"✅ Booked",link:"",map:"",guru:"",pdf:"https://github.com/viralnb/spain2026/raw/main/docs/side_trip_RVKQHC.pdf"}
]}

const CAT={travel:"#856404",train:"#856404",culture:"#155724",arch:"#155724",food:"#8a4b08",leisure:"#0c5460",show:"#6c3483"};
let activeCity="bcn",expandAll=false;

function render(){
  const city=C.find(c=>c.id===activeCity);
  const w=W[activeCity];

  // Tabs
  document.getElementById("tabs").innerHTML=C.map(c=>
    `<button class="tab${activeCity===c.id?" active":""}" style="${activeCity===c.id?`background:${c.accent||"#e94560"}`:""}" onclick="activeCity='${c.id}';expandAll=false;render()">${c.name}</button>`
  ).join("");

  let html="";

  // City card or flight card
  if(city.nights>0){
    const h=city.htl;
    html+=`<div class="city-card" style="background:linear-gradient(135deg,${city.color},${city.accent})">
      <h2>${city.name}</h2>
      <div class="dates">${city.dates} · ${city.nights} nights</div>
      <div class="hotel">🏨 ${city.hotel}</div>
      ${w?`<div class="weather"><div class="icon">${w.i}</div><div class="temp">${w.hi}°/${w.lo}°</div><div class="wnote">${w.n}</div></div>`:""}
    </div>`;
    if(h){
      html+=`<div class="htl-card" onclick="this.classList.toggle('open')">
        <div class="htl-top"><span class="htl-label">🏨 Reservation</span><span class="htl-toggle">▼</span></div>
        <div class="htl-name">${city.hotel}</div>
        <div class="htl-room">${h.room}${h.notes?" · "+h.notes:""}</div>
        <div class="htl-body">
          <div class="htl-row"><span class="label">Confirmation</span><span class="val">${h.conf}</span></div>
          <div class="htl-row"><span class="label">Address</span><span class="val">${h.addr}</span></div>
          ${h.ph?`<div class="htl-row"><span class="label">Phone</span><span class="val">${h.ph}</span></div>`:""}
          <div class="htl-btns">
            ${h.pdf?`<a class="btn-pdf" href="${h.pdf}" target="_blank" rel="noopener" onclick="event.stopPropagation()">📄 Voucher PDF</a>`:""}
            ${h.ph?`<a class="btn-call" href="tel:${h.ph.replace(/\\s/g,'')}" onclick="event.stopPropagation()">📞 Call Hotel</a>`:""}
            ${h.addr?`<a class="btn-map" href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(city.hotel+' '+h.addr)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">📍 Map</a>`:""}
          </div>
        </div>
      </div>`;
    }
  } else {
    html+=`<div class="flight-card"><h2>✈ Flight Details</h2><div class="sub">Viral · Mansi · Reyansh</div></div>`;
  }

  // Expand/collapse
  if(city.days.length>1){
    html+=`<div class="toolbar"><button class="expand-btn" onclick="expandAll=!expandAll;render()">${expandAll?"Collapse all":"Expand all"}</button></div>`;
  }

  // Days
  city.days.forEach((day,di)=>{
    const isOpen=expandAll||city.days.length===1;
    html+=`<div class="day-header" onclick="this.classList.toggle('open');this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'">
      <div><span class="day-label">${day.label}</span><span class="day-count">${day.a.length}</span>${(()=>{const dw=DW[day.date];return dw?`<span style="margin-left:8px;font-size:11px;color:#888">${dw.i} ${dw.hi}° ${dw.n}</span>`:""})()}</div>
      <span class="day-toggle">${isOpen?"−":"+"}</span>
    </div>`;
    html+=`<div class="day-activities" style="display:${isOpen?"block":"none"}">`;
    day.a.forEach((act,ai)=>{
      const col=CAT[act.cat]||"#0c5460";
      const urg=act.note&&act.note.includes("⚠️");
      const done=act.book&&(act.book.includes("Done")||act.book.includes("✅"));
      const yes=act.book&&(act.book.includes("YES")||act.book.includes("Rec")||act.book.includes("Mezquita")||act.book.includes("Pena"));
      const guru=act.book&&act.book.includes("GuruWalk");
      let badge="";
      if(act.book){
        const cls=done?"done":(yes||guru)?"yes":"other";
        badge=`<span class="badge ${cls}">${act.book}</span>`;
      }
      html+=`<div class="activity${urg?" urgent":""}" style="border-left-color:${urg?"#e74c3c":col}" onclick="this.classList.toggle('open')">
        <div class="act-top">
          <div class="act-main">
            <div class="act-title"><span class="act-icon">${act.icon}</span><span class="act-name">${act.t}</span></div>
            <div class="act-meta">
              ${act.time?`<span class="act-time">${act.time}</span>`:""}
              ${act.cost?`<span class="act-cost">${act.cost}</span>`:""}
              ${badge}
            </div>
          </div>
          <span class="act-arrow">▼</span>
        </div>
        <div class="act-detail">
          ${act.cat2||act.kid?`<div style="display:flex;gap:8px;margin-bottom:6px;flex-wrap:wrap">${act.cat2?`<span style="font-size:11px;background:#e8f4f8;color:#0c5460;padding:2px 8px;border-radius:12px;font-weight:600">${act.cat2}</span>`:""} ${act.kid?`<span style="font-size:11px;background:#fff8e1;color:#856404;padding:2px 8px;border-radius:12px;font-weight:600">Kids ${"★".repeat(act.kid)}${"☆".repeat(5-act.kid)}</span>`:""}</div>`:""}
          ${act.detail?`<p>${act.detail}</p>`:""}
          ${act.note?`<p class="note${urg?" urgent-note":""}">${act.note}</p>`:""}
          <div class="act-buttons">
            ${act.link?`<a class="btn-book" href="${act.link}" target="_blank" rel="noopener" onclick="event.stopPropagation()">🔗 Book</a>`:""}
            ${act.map?`<a class="btn-map" href="${act.map}" target="_blank" rel="noopener" onclick="event.stopPropagation()">📍 Map</a>`:""}
            ${act.guru?`<a class="btn-guru" href="${act.guru}" target="_blank" rel="noopener" onclick="event.stopPropagation()">🚶 GuruWalk</a>`:""}
            ${act.pdf?`<a class="btn-pdf" href="${act.pdf}" target="_blank" rel="noopener" onclick="event.stopPropagation()">📄 Voucher</a>`:""}
          </div>
        </div>
      </div>`;
      if(act.next){
        const n=act.next;
        const best=n.best?`<span class="ts-best">${n.best}</span>`:"";
        const alt=n.alt?`<span class="ts-sep">·</span><span class="ts-alt">${n.alt}</span>`:"";
        html+=`<div class="travel-strip">${best}${alt}</div>`;
      }
    });
    html+=`</div>`;
  });

  // Overview on flights tab
  if(city.id==="flights"){
    html+=`<div class="overview"><h3>Trip at a Glance</h3>`;
    C.filter(c=>c.nights>0).forEach(c=>{
      const cw=W[c.id];
      html+=`<div class="ov-row" onclick="activeCity='${c.id}';render()">
        <span class="ov-city">${c.name}</span>
        <span class="ov-info">${cw?cw.i+" "+cw.hi+"°":""} · ${c.nights}N · ${c.hotel.length>18?c.hotel.slice(0,16)+"…":c.hotel}</span>
      </div>`;
    });
    html+=`<div class="ov-total"><span>Total</span><span>21 nights</span></div></div>`;
    html+=`<div class="overview" style="margin-top:10px;border-left:4px solid #e74c3c">
      <h3>🆘 Emergency Contact</h3>
      <div class="htl-row"><span class="label">ACME Travel</span><span class="val">Vaishali Agarwal</span></div>
      <div class="htl-btns" style="margin-top:8px">
        <a class="btn-call" href="tel:+919819815779" style="background:#c0392b">📞 +91 98198 15779</a>
      </div>
    </div>`;
  }

  document.getElementById("content").innerHTML=html;
}

render();
</script>
</body>
</html>
